name: refresh-scorecard

on:
  schedule:
    # GitHub 免费版定时常被延迟数小时甚至跳过 → 一天多打几枪,任一命中即可(脚本按日期去重)。
    # 时间(UTC→KST,周一至五): 06:50→15:50(收盘价已出) / 09:20→18:20(资金流/VKOSPI定稿) / 11:40→20:40(全源settle兜底)
    # 真要分秒不差,见 README「外部定时」用 cron-job.org 调 workflow_dispatch。
    - cron: "50 6 * * 1-5"
    - cron: "20 9 * * 1-5"
    - cron: "40 11 * * 1-5"
  workflow_dispatch: {}        # 允许手动触发
  push:
    branches: [ main ]
    paths: [ "state.json", "config.py", "refresh.py" ]   # 改手填/配置后立即重算

permissions:
  contents: write              # 允许把生成的 index.html / 历史 提交回仓库

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # 2026-06-16 起 GitHub 强制 Node24,提前切换消 deprecation 警告
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run refresh
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}   # 可选；设了就经代理抓 VKOSPI，没设则沿用 state.json
        run: python refresh.py
      - name: Commit updated dashboard
        run: |
          git config user.name  "scorecard-bot"
          git config user.email "actions@github.com"
          git add index.html status.json data_history.csv
          if git diff --staged --quiet; then
            echo "无变化（可能是周末/韩国假日，无新交易日数据）"
          else
            git commit -m "auto: refresh $(date -u +%Y-%m-%d) [skip ci]"
            # 跑分期间若有人推了 state.json(手机改手填),直接 push 会被拒 → rebase 后再推
            git pull --rebase origin main || true
            git push
          fi
